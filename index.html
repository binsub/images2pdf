<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image to PDF Converter</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    h1 { font-size: 1.6rem; margin-bottom: 0.25rem; }

    .subtitle { color: #8b949e; font-size: 0.85rem; margin-bottom: 1.5rem; }

    .dropzone {
      width: 100%;
      max-width: 640px;
      border: 2px dashed #30363d;
      border-radius: 12px;
      padding: 2.5rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: #161b22;
    }

    .dropzone.drag-over { border-color: #58a6ff; background: #1c2433; }
    .dropzone p { color: #8b949e; margin-top: 0.5rem; font-size: 0.85rem; }
    .dropzone .icon { font-size: 2.5rem; }

    .browse-btn {
      display: inline-block;
      margin-top: 0.75rem;
      padding: 0.45rem 1.2rem;
      background: #238636;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .browse-btn:hover { background: #2ea043; }

    .preview-area { width: 100%; max-width: 640px; margin-top: 1.25rem; }

    .preview-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }

    .preview-header span { font-size: 0.85rem; color: #8b949e; }

    .clear-btn {
      background: none;
      border: 1px solid #30363d;
      color: #f85149;
      padding: 0.3rem 0.75rem;
      border-radius: 6px;
      font-size: 0.75rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .clear-btn:hover { background: #1c2433; }

    .preview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 0.6rem;
    }

    .preview-card {
      position: relative;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #30363d;
      background: #0d1117;
      aspect-ratio: 1;
    }

    .preview-card img { width: 100%; height: 100%; object-fit: cover; }

    .preview-card .order {
      position: absolute;
      top: 4px;
      left: 4px;
      background: rgba(0,0,0,0.7);
      color: #e6edf3;
      font-size: 0.7rem;
      padding: 1px 6px;
      border-radius: 4px;
    }

    .preview-card .remove-btn {
      position: absolute;
      top: 4px;
      right: 4px;
      background: rgba(0,0,0,0.7);
      color: #f85149;
      border: none;
      font-size: 0.9rem;
      cursor: pointer;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    .convert-btn {
      margin-top: 1.25rem;
      padding: 0.65rem 2rem;
      background: #238636;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }

    .convert-btn:hover { background: #2ea043; }
    .convert-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .status { margin-top: 0.75rem; font-size: 0.85rem; color: #8b949e; min-height: 1.2rem; }

    .settings {
      width: 100%;
      max-width: 640px;
      margin-top: 1rem;
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .settings label {
      font-size: 0.8rem;
      color: #8b949e;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .settings select {
      background: #161b22;
      color: #e6edf3;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 0.3rem 0.5rem;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>

  <h1>📄 Image → PDF</h1>
  <p class="subtitle">Upload images, reorder, and download as a single PDF</p>

  <div class="settings">
    <label>
      Page size:
      <select id="pageSize">
        <option value="a4" selected>A4</option>
        <option value="letter">Letter</option>
      </select>
    </label>
    <label>
      Orientation:
      <select id="orientation">
        <option value="portrait" selected>Portrait</option>
        <option value="landscape">Landscape</option>
      </select>
    </label>
    <label>
      Image fit:
      <select id="fitMode">
        <option value="fit" selected>Fit (keep ratio)</option>
        <option value="stretch">Stretch to page</option>
      </select>
    </label>
  </div>

  <div class="dropzone" id="dropzone">
    <div class="icon">🖼️</div>
    <p>Drag &amp; drop images here</p>
    <button class="browse-btn" id="browseBtn">Browse Files</button>
    <input type="file" id="fileInput" accept=".jpg,.jpeg" multiple hidden>
  </div>

  <div class="preview-area" id="previewArea" hidden>
    <div class="preview-header">
      <span id="fileCount">0 images</span>
      <button class="clear-btn" id="clearBtn">Clear All</button>
    </div>
    <div class="preview-grid" id="previewGrid"></div>
  </div>

  <button class="convert-btn" id="convertBtn" disabled>Convert to PDF &amp; Download</button>
  <p class="status" id="status"></p>

  <script>
    var SUPPORTED_FORMATS = [
      { mime: 'image/jpeg', extensions: ['.jpg', '.jpeg'] },
    ];

    var ALLOWED_MIMES = SUPPORTED_FORMATS.map(function(f) { return f.mime; });
    var ALLOWED_EXTENSIONS = SUPPORTED_FORMATS.reduce(function(acc, f) { return acc.concat(f.extensions); }, []);
    var ACCEPT_STRING = ALLOWED_EXTENSIONS.join(',');

    var imageFiles = [];

    var dropzone = document.getElementById('dropzone');
    var fileInput = document.getElementById('fileInput');
    var browseBtn = document.getElementById('browseBtn');
    var previewArea = document.getElementById('previewArea');
    var previewGrid = document.getElementById('previewGrid');
    var fileCount = document.getElementById('fileCount');
    var clearBtn = document.getElementById('clearBtn');
    var convertBtn = document.getElementById('convertBtn');
    var statusEl = document.getElementById('status');
    var pageSizeSelect = document.getElementById('pageSize');
    var orientationSelect = document.getElementById('orientation');
    var fitModeSelect = document.getElementById('fitMode');

    fileInput.setAttribute('accept', ACCEPT_STRING);

    function isFileAllowed(file) {
      var ext = '.' + file.name.split('.').pop().toLowerCase();
      return ALLOWED_MIMES.indexOf(file.type) !== -1 || ALLOWED_EXTENSIONS.indexOf(ext) !== -1;
    }

    function readAsDataURL(file) {
      return new Promise(function(resolve, reject) {
        var reader = new FileReader();
        reader.onload = function() { resolve(reader.result); };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function processFiles(files) {
      var validFiles = Array.from(files).filter(isFileAllowed);
      if (validFiles.length === 0) {
        setStatus('No supported files found. Accepted: ' + ALLOWED_EXTENSIONS.join(', '), true);
        return;
      }
      if (validFiles.length < files.length) {
        setStatus((files.length - validFiles.length) + ' unsupported file(s) skipped.', true);
      }

      for (var i = 0; i < validFiles.length; i++) {
        var dataUrl = await readAsDataURL(validFiles[i]);
        imageFiles.push({ file: validFiles[i], dataUrl: dataUrl });
      }
      renderPreviews();
    }

    function setStatus(msg, isWarning) {
      statusEl.textContent = msg;
      statusEl.style.color = isWarning ? '#d29922' : '#8b949e';
    }

    function renderPreviews() {
      previewGrid.innerHTML = '';
      previewArea.hidden = imageFiles.length === 0;
      convertBtn.disabled = imageFiles.length === 0;
      fileCount.textContent = imageFiles.length + ' image' + (imageFiles.length !== 1 ? 's' : '');

      imageFiles.forEach(function(item, index) {
        var card = document.createElement('div');
        card.className = 'preview-card';
        card.draggable = true;
        card.dataset.index = index;

        var img = document.createElement('img');
        img.src = item.dataUrl;
        img.alt = item.file.name;
        card.appendChild(img);

        var order = document.createElement('span');
        order.className = 'order';
        order.textContent = index + 1;
        card.appendChild(order);

        var removeBtn = document.createElement('button');
        removeBtn.className = 'remove-btn';
        removeBtn.title = 'Remove';
        removeBtn.textContent = '\u00d7';
        removeBtn.dataset.index = index;
        card.appendChild(removeBtn);

        card.addEventListener('dragstart', onDragStart);
        card.addEventListener('dragover', onDragOver);
        card.addEventListener('drop', onDrop);
        card.addEventListener('dragend', onDragEnd);

        removeBtn.addEventListener('click', function(e) {
          e.stopPropagation();
          imageFiles.splice(index, 1);
          renderPreviews();
          setStatus('');
        });

        previewGrid.appendChild(card);
      });
    }

    var dragIndex = null;

    function onDragStart(e) {
      dragIndex = +e.currentTarget.dataset.index;
      e.currentTarget.style.opacity = '0.4';
    }

    function onDragOver(e) { e.preventDefault(); }

    function onDrop(e) {
      e.preventDefault();
      var dropIdx = +e.currentTarget.dataset.index;
      if (dragIndex === null || dragIndex === dropIdx) return;
      var moved = imageFiles.splice(dragIndex, 1)[0];
      imageFiles.splice(dropIdx, 0, moved);
      renderPreviews();
    }

    function onDragEnd(e) {
      e.currentTarget.style.opacity = '1';
      dragIndex = null;
    }

    browseBtn.addEventListener('click', function() { fileInput.click(); });
    fileInput.addEventListener('change', function() {
      if (fileInput.files.length) {
        processFiles(fileInput.files);
        fileInput.value = '';
      }
    });

    dropzone.addEventListener('dragover', function(e) {
      e.preventDefault();
      dropzone.classList.add('drag-over');
    });
    dropzone.addEventListener('dragleave', function() { dropzone.classList.remove('drag-over'); });
    dropzone.addEventListener('drop', function(e) {
      e.preventDefault();
      dropzone.classList.remove('drag-over');
      processFiles(e.dataTransfer.files);
    });

    clearBtn.addEventListener('click', function() {
      imageFiles = [];
      renderPreviews();
      setStatus('');
    });

    convertBtn.addEventListener('click', async function() {
      if (imageFiles.length === 0) return;

      convertBtn.disabled = true;
      setStatus('Generating PDF...');

      try {
        var jsPDF = window.jspdf.jsPDF;
        var pageSize = pageSizeSelect.value;
        var orientation = orientationSelect.value;
        var fitMode = fitModeSelect.value;
        var doc = new jsPDF({ orientation: orientation, unit: 'mm', format: pageSize });

        for (var i = 0; i < imageFiles.length; i++) {
          if (i > 0) doc.addPage();

          var imgData = imageFiles[i].dataUrl;
          var pageW = doc.internal.pageSize.getWidth();
          var pageH = doc.internal.pageSize.getHeight();

          if (fitMode === 'stretch') {
            doc.addImage(imgData, 'JPEG', 0, 0, pageW, pageH);
          } else {
            var imgEl = await loadImage(imgData);
            var ratio = Math.min(pageW / imgEl.width, pageH / imgEl.height);
            var w = imgEl.width * ratio;
            var h = imgEl.height * ratio;
            var x = (pageW - w) / 2;
            var y = (pageH - h) / 2;
            doc.addImage(imgData, 'JPEG', x, y, w, h);
          }

          setStatus('Processing image ' + (i + 1) + ' of ' + imageFiles.length + '...');
        }

        doc.save('images-merged.pdf');
        setStatus('Done! ' + imageFiles.length + ' image(s) merged into PDF.');
      } catch (err) {
        console.error(err);
        setStatus('Something went wrong. Check console for details.', true);
      } finally {
        convertBtn.disabled = imageFiles.length === 0;
      }
    });

    function loadImage(src) {
      return new Promise(function(resolve, reject) {
        var img = new Image();
        img.onload = function() { resolve(img); };
        img.onerror = reject;
        img.src = src;
      });
    }
  </script>
</body>
</html>
